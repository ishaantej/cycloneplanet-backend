name: Update Storm Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 🔥 RUN BOTH SCRIPTS
      - name: Run scripts
        run: |
          node fetch.js
          node fetchNews.js

      # 🔥 COMMIT BOTH FILES
      - name: Commit changes
        run: |
          git config user.name "storm-bot"
          git config user.email "storm@bot.com"
          git add data.json news.json
          git diff --cached --quiet || git commit -m "update storm + news data"
          git push
