name: Update Storm Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 THIS FIXES EXIT CODE 128

    steps:
      - uses: actions/checkout@v4   # updated version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run script
        run: node fetch.js

      - name: Commit changes
        run: |
          git config user.name "storm-bot"
          git config user.email "storm@bot.com"
          git add data.json
          git diff --cached --quiet || git commit -m "update storm data"
          git push
